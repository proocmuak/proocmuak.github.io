<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Эклер store</title>
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="all.css" />
    <script src="all.js"></script>
  </head>
  <body>
    <div class="app">
      <div class="shapka">
        <ul class="list">
          <li class="topMenuItem"><i class="fad fa-pie"></i>Эклер</li>
          <li class="topMenuItem">Магазин</li>
          <li class="topMenuItem">Группы</li>
          <li class="topMenuItem">Новости</li>
          <li class="topMenuItem">Поддержка</li>
        </ul>
      </div>

      <div class="menuSearch">
        <input type="search" name="" class="searchName" placeholder="Поиск" />
        <div class="searchCategories">Поиск по категориям</div>
      </div>
      <div class="fonForSlider">
        <div class="leftarrow"><i class="fad fa-chevron-left"></i></div>
        <div class="menuSlider">slide</div>
        <div class="rightarrow"><i class="fad fa-chevron-right"></i></div>
      </div>
      <div class="menuGames">
        <div class="windowGames">1</div>
        <div class="windowGames">2</div>
        <div class="windowGames">3</div>
        <div class="windowGames">4</div>
        <div class="windowGames">5</div>
        <div class="windowGames">6</div>
        <div class="windowGames">7</div>
        <div class="windowGames">8</div>
        <div class="windowGames">9</div>
      </div>
    </div>
  </body>
</html>
