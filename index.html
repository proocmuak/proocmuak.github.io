<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Document</title>
    <script src="main.js"></script>
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="all.css" />
    <script src="all.js"></script>
    <link
      href="http://allfont.ru/allfont.css?fonts=quicksand-bold"
      rel="stylesheet"
      type="text/css"
    />
  </head>
  <body>
    <div id="app">
      <div id="bigFirstBlock">
        <div id="menu">
          <i class="fas fa-burger-soda"></i>
          <span id="delivery">
            <span>Home</span>
            <span> Products</span>
            <i class="fas fa-shopping-basket"></i>
          </span>
        </div>
        <div id="slider">
          <span id="arrowLeft"><i class="fal fa-chevron-left"></i></span>
          <div id="introduce"></div>
          <span id="arrowRight"><i class="fal fa-chevron-right"></i></span>
        </div>
      </div>
      <div id="smallSecondBlock">
        <div id="category">
          <div id="pol">
            <span class="textPol"> Бургеры</span>
            <span class="textPol"> Твистеры</span>
            <span class="textPol"> Курица </span>
            <span class="textPol">Баскеты</span>
            <span class="textPol">Снэки</span>
            <span class="textPol">Соусы</span>
            <span class="textPol">Напитки</span>
            <span class="textPol">Десерты</span>
          </div>
        </div>
      </div>
      <div id="bigThirdBlock">
        <div class="catalogPol">
          <div class="card">
            <span class="productName"></span>
          </div>
          <div class="card"><span class="productName">Гамбургер</span></div>
          <div class="card"><span class="productName"></span></div>
        </div>
        <div class="catalogPol">
          <div class="card"><span class="productName"></span></div>
          <div class="card"><span class="productName"></span></div>
          <div class="card"><span class="productName"></span></div>
        </div>
      </div>
    </div>
  </body>
</html>
